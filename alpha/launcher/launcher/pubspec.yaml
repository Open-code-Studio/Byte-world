
name: byteworld_launcher
description: ByteWorld Game Launcher
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Material Design 3
  material_color_utilities: ^0.8.0
  
  # State Management
  provider: ^6.1.1
  
  # HTTP
  http: ^1.1.2
  
  # JSON
  json_annotation: ^4.8.1
  
  # File System
  path_provider: ^2.1.1
  
  # Process
  process_run: ^0.13.0
  
  # Hashing
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/

fonts:
  - family: Inter
    fonts:
      - asset: fonts/Inter-Regular.ttf
      - asset: fonts/Inter-Bold.ttf
        weight: 700
      - asset: fonts/Inter-Light.ttf
        weight: 300
